services:
  - type: web
    name: maximus-mcp-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false
      - key: STEPHANE_MCP_URL
        sync: false
      - key: CAL_MCP_URL
        sync: false
      - key: TERRASSES_MCP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
